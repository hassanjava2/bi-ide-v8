# BI-IDE Distributed Training Fleet
# الحاسبات المتوفرة للتدريب الموزع

workers:
  # القيادة المركزية — تدريب + inference
  - name: rtx-5090-local
    host: 192.168.1.164
    user: bi
    gpus: 1
    vram_gb: 24
    model: RTX 5090
    role: primary          # inference + training
    ssh_key: ~/.ssh/id_rsa
    workspace: ~/bi-ide-v8
    venv: /home/bi/.bi-ide-worker/venv/bin/python3
    max_concurrent: 2      # كبسولتين بنفس الوقت (24GB / 10GB each)
    cpu_percent: 30         # 30% من المعالج — الباقي لخدمات أخرى

# === Hostinger VPS (CPU only) ===
  - name: vps-hostinger
    host: bi-iq.com
    user: root
    gpus: 0
    vram_gb: 0
    model: CPU
    role: training
    ssh_key: ~/.ssh/id_rsa
    workspace: /root/.bi-ide-worker
    venv: /root/.bi-ide-worker/venv/bin/python3
    max_concurrent: 1
    cpu_percent: 75         # 75% — الباقي للموقع

# === Windows Desktop (RTX 4050 6GB) ===
  - name: windows-desktop
    host: 100.76.169.110
    user: bi
    gpus: 1
    vram_gb: 6
    model: RTX 4050
    role: training
    ssh_key: ~/.ssh/id_rsa
    workspace: C:\Users\bi\.bi-ide-worker
    venv: python
    max_concurrent: 1
    cpu_percent: 50         # 50% من المعالج

# === أضف حاسبات هنا ===
# مثال H200:
#  - name: h200-cluster-1
#    host: worker-1.example.com
