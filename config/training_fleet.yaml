#    workspace: ~/bi-ide-v8
#    venv: ~/venv/bin/python3
#    max_concurrent: 12     # 141GB / 10GB = ~12 capsules per GPU

# الموديل الأساسي
base_model: Qwen/Qwen2.5-1.5B

# إعدادات التدريب
training:
  min_samples: 20
  max_steps_per_sample_ratio: 2    # max_steps = samples * ratio
  max_steps_cap: 2000
  batch_size: 1
  gradient_accumulation: 16
  learning_rate: 0.00005
  max_seq_length: 256
  bf16: true
  save_steps: 500
